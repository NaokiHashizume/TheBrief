name: X auto post

# TheBrief の記事を 10 分ごとに X に自動投稿する。
# 使い方:
#   1. リポジトリ Settings → Secrets and variables → Actions に下記を登録
#        X_API_KEY        (Consumer Key / API Key)
#        X_API_SECRET     (Consumer Secret / API Key Secret)
#        X_ACCESS_TOKEN
#        X_ACCESS_SECRET
#   2. workflow_dispatch から手動でドライラン (dry_run=true) も可能。

on:
  schedule:
    - cron: "*/10 * * * *" # 10分ごと
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true なら投稿せず本文のみ生成"
        required: false
        default: "false"

concurrency:
  group: x-auto-post
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: node scripts/post-to-x.mjs

      - name: Commit updated post history
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/x-post-history.json
          if git diff --cached --quiet; then
            echo "No history changes to commit"
          else
            git commit -m "chore: update X post history [skip ci]"
            git pull --rebase origin claude/develop-the-brief-BT7fX
            git push
          fi
